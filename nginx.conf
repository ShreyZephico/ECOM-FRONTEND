server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback for React Router
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: if you also run a backend behind the same domain,
  # configure the reverse proxy for /api here (or at your platform/load balancer).
  # location /api/ {
  #   proxy_pass http://backend:9000/;
  # }
}
